name: Reusable Security Pipeline

on:
  workflow_call:
    inputs:
      exclude-dirs:
        description: "Comma-separated list of directories to exclude from fallback scanning"
        required: false
        type: string
        default: "workspace_storage,tests"
      config-path:
        description: "Path to config.json within the CEVuD scanner codebase"
        required: false
        type: string
        default: "/app/config.json"
      scanner-repo:
        description: "Owner/name of the repo that holds the CEVuD scanner code (defaults to the calling repo so forks stay in sync with their own image)"
        required: false
        type: string
        default: "${{ github.repository }}"
    secrets:
      OPENAI_API_KEY:
        required: true
      ANTHROPIC_API_KEY:
        required: false
      GOOGLE_API_KEY:
        required: false
      UNIPASSAU_API_KEY:
        required: false
      HF_TOKEN:
        required: false

# config.json → models.classifier_model is the single source of truth for
# the model ID. After checking out the scanner repo we extract it from
# cevud-scanner/config.json and use it for the HF pull step and Docker
# runtime. No workflow input overrides it.
env:
  CEVUD_RUN_ID: run_${{ github.run_id }}

jobs:
  security-triage:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
      
    steps:
      - name: Checkout Target Codebase
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Checkout CEVuD Pipeline Codebase
        uses: actions/checkout@v4
        with:
          repository: ${{ inputs.scanner-repo }}
          path: cevud-scanner
          ref: main

      - name: Extract classifier model ID from cevud-scanner/config.json
        id: model-id
        run: |
          MODEL_ID=$(python -c "import json; print(json.load(open('cevud-scanner/config.json'))['models']['classifier_model'])")
          echo "model_id=$MODEL_ID" >> "$GITHUB_OUTPUT"
          echo "[*] Classifier model from config.json: $MODEL_ID"

      - name: Initialize Environment Workspace Directories
        run: |
          echo "[*] Stage 2/3 will create workspace_storage subdirectories on demand via run_context.py"

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute lowercase image reference
        id: image
        run: |
          IMAGE=$(echo "ghcr.io/${{ github.repository }}/appsec-pipeline" | tr '[:upper:]' '[:lower:]')
          echo "image=$IMAGE" >> "$GITHUB_OUTPUT"

      - name: Pull Pre-Built Security Pipeline Image
        run: |
          docker pull ${{ steps.image.outputs.image }}:latest

      - name: Pull SLM from HuggingFace Hub
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          docker run --rm \
            -v ${{ github.workspace }}:/workspace \
            -e HF_TOKEN \
            -e CLASSIFIER_MODEL="${{ steps.model-id.outputs.model_id }}" \
            ${{ steps.image.outputs.image }}:latest \
            python -c "
import os, sys
from huggingface_hub import snapshot_download
token = os.environ.get('HF_TOKEN') or None
model_id = os.environ.get('CLASSIFIER_MODEL', '').strip()
if not model_id:
    print('[*] No model ID set, skipping.')
    sys.exit(0)
try:
    path = snapshot_download(model_id, token=token)
    print(f'[+] Model cached at: {path}')
except Exception as exc:
    print(f'[!] Model download failed (will try again at runtime): {exc}')
"

      - name: Execute Stage 1 (Static Analysis Engine Capture)
        run: |
          RUN_DIR="workspace_storage/artifacts/${CEVUD_RUN_ID}"
          mkdir -p "$RUN_DIR"
          docker run --rm \
            -e CEVUD_RUN_ID="${CEVUD_RUN_ID}" \
            -v ${{ github.workspace }}:/workspace \
            ${{ steps.image.outputs.image }}:latest \
            semgrep --config=p/python --config=/app/semgrep_rules/custom_appsec_rules.yaml --no-git-ignore --exclude src --exclude workspace_storage --exclude cevud-scanner --json --output="/workspace/${RUN_DIR}/semgrep_results.json" /workspace

      - name: Execute Stage 2 (Local SLM Mathematical Gating)
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          docker run --rm \
            -e CEVUD_RUN_ID="${CEVUD_RUN_ID}" \
            -e HF_TOKEN="${HF_TOKEN}" \
            -e CLASSIFIER_MODEL="${{ steps.model-id.outputs.model_id }}" \
            -v ${{ github.workspace }}:/workspace \
            ${{ steps.image.outputs.image }}:latest \
            python /app/src/triage_orchestrator.py --workspace /workspace --config ${{ inputs.config-path }} --exclude-dirs "${{ inputs.exclude-dirs }},cevud-scanner"

      - name: Execute Stage 3 (DeepAgent Context Analysis & Synthesis)
        if: always()
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          UNIPASSAU_API_KEY: ${{ secrets.UNIPASSAU_API_KEY }}
        run: |
          docker run --rm \
            -e OPENAI_API_KEY \
            -e ANTHROPIC_API_KEY \
            -e GOOGLE_API_KEY \
            -e UNIPASSAU_API_KEY \
            -e CEVUD_RUN_ID="${CEVUD_RUN_ID}" \
            -v ${{ github.workspace }}:/workspace \
            ${{ steps.image.outputs.image }}:latest \
            python /app/src/agent.py --workspace /workspace --config ${{ inputs.config-path }}

      - name: Archive Run-Specific Security Artifact Dossier
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: security-triage-dossier-${{ github.run_id }}
          path: workspace_storage/artifacts/${{ env.CEVUD_RUN_ID }}/
          retention-days: 14
