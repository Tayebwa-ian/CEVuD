name: Build and Publish Pipeline Image

on:
  push:
    branches: [ main ]
    paths:
      - 'Dockerfile'
      - 'src/**'
      - 'semgrep_rules/**'
      - 'requirements.txt'
      - 'config.json'
      - '.github/workflows/publish_image.yml'
  pull_request:
    branches: [ main ]
    paths:
      - 'Dockerfile'
      - 'src/**'
      - 'semgrep_rules/**'
      - 'requirements.txt'
      - 'config.json'
      - '.github/workflows/publish_image.yml'
  workflow_dispatch: {}

# config.json → models.classifier_model is the single source of truth for
# the model ID. This workflow reads it and passes it as a Docker build arg so
# the model_downloader stage pre-caches the exact model the pipeline will use.
env:
  IMAGE_NAME: ghcr.io/${{ github.repository }}/appsec-pipeline

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Extract classifier model ID from config.json
        id: model-id
        run: |
          MODEL_ID=$(python -c "import json; print(json.load(open('config.json'))['models']['classifier_model'])")
          echo "model_id=$MODEL_ID" >> "$GITHUB_OUTPUT"
          echo "[*] Classifier model from config.json: $MODEL_ID"

      - name: Compute lowercase image reference
        id: image
        run: |
          IMAGE=$(echo "${{ env.IMAGE_NAME }}" | tr '[:upper:]' '[:lower:]')
          echo "image=$IMAGE" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to HuggingFace Hub
        if: github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          registry: huggingface.co
          username: ${{ github.actor }}
          password: ${{ secrets.HF_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: ${{ github.event_name == 'push' }}
          tags: |
            ${{ steps.image.outputs.image }}:latest
            ${{ steps.image.outputs.image }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=min
          build-args: |
            CLASSIFIER_MODEL=${{ steps.model-id.outputs.model_id }}
            HF_TOKEN=${{ secrets.HF_TOKEN }}
