name: Two-Stage Vulnerability Detection Pipeline

on:
  pull_request:
    branches: [ main, master ]
  push:
    branches: [ main, master ]

# CEVUD_RUN_ID is the single source of truth for the artifact directory. It is
# set once here and passed into every stage (Stage 1/2/3) so they all write
# to / read from the same run-scoped folder. See src/run_context.py.
env:
  CEVUD_RUN_ID: run_${{ github.run_id }}

jobs:
  security-triage:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
    
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Compute lowercase image reference
        id: image
        run: |
          IMAGE="ghcr.io/${{ github.repository }}/appsec-pipeline"
          echo "image=$(echo "$IMAGE" | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

      - name: Initialize Environment Workspace Directories
        run: |
          echo "[*] Stage 2/3 will create workspace_storage subdirectories on demand via run_context.py"

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull Pre-Built Security Pipeline Image
        run: |
          docker pull ${{ steps.image.outputs.image }}:latest

      - name: Execute Stage 1 (Static Analysis Engine Capture)
        run: |
          RUN_DIR="workspace_storage/artifacts/${CEVUD_RUN_ID}"
          mkdir -p "$RUN_DIR"
          docker run --rm \
            -e CEVUD_RUN_ID="${CEVUD_RUN_ID}" \
            -v ${{ github.workspace }}:/workspace ${{ steps.image.outputs.image }}:latest \
            semgrep --config=p/python --config=/app/semgrep_rules/custom_appsec_rules.yaml --no-git-ignore --exclude src --exclude workspace_storage --exclude cevud-scanner --json --output="/workspace/${RUN_DIR}/semgrep_results.json" /workspace

      - name: Execute Stage 2 (Local SLM Mathematical Gating)
        run: |
          docker run --rm \
            -e CEVUD_RUN_ID="${CEVUD_RUN_ID}" \
            -v ${{ github.workspace }}:/workspace \
            ${{ steps.image.outputs.image }}:latest python /app/src/triage_orchestrator.py --workspace /workspace --config /app/config.json --exclude-dirs "workspace_storage,tests,src"

      - name: Execute Stage 3 (DeepAgent Context Analysis & Synthesis)
        if: always()
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          UNIPASSAU_API_KEY: ${{ secrets.UNIPASSAU_API_KEY }}
        run: |
          docker run --rm \
            -e OPENAI_API_KEY \
            -e ANTHROPIC_API_KEY \
            -e GOOGLE_API_KEY \
            -e UNIPASSAU_API_KEY \
            -e CEVUD_RUN_ID="${CEVUD_RUN_ID}" \
            -v ${{ github.workspace }}:/workspace \
            ${{ steps.image.outputs.image }}:latest python /app/src/agent.py --workspace /workspace --config /app/config.json

      - name: Archive Run-Specific Security Artifact Dossier
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: security-triage-dossier-${{ github.run_id }}
          path: workspace_storage/artifacts/${{ env.CEVUD_RUN_ID }}/
          retention-days: 14
