name: Two-Stage Vulnerability Detection Pipeline

on:
  pull_request:
    branches: [ main, master ]
  push:
    branches: [ main, master ]

jobs:
  security-triage:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
    
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Compute lowercase image reference
        id: image
        run: |
          IMAGE="ghcr.io/${{ github.repository }}/appsec-pipeline"
          echo "image=$(echo "$IMAGE" | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

      - name: Initialize Environment Workspace Directories
        run: |
          mkdir -p workspace_storage/codebase_vectors 
          mkdir -p workspace_storage/artifacts/run_${{ github.sha }}



      # --- ✅ NEW: Login to GHCR and Pull Pre-Built Image ---
      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull Pre-Built Security Pipeline Image
        run: |
          docker pull ${{ steps.image.outputs.image }}:latest

      - name: Execute Stage 1 (Static Analysis Engine Capture)
        run: |
          docker run --rm -v ${{ github.workspace }}:/app/workspace ${{ steps.image.outputs.image }}:latest \
            semgrep --config=p/python --config=/app/semgrep_rules/custom_appsec_rules.yaml --no-git-ignore --exclude src --exclude workspace_storage --json --output=/app/workspace/semgrep_results.json /app/workspace

      - name: Execute Stage 2 (Local SLM Mathematical Gating)
        env:
          GITHUB_RUN_ID: "run_${{ github.sha }}"
        run: |
          # 🚫 REMOVE: model_cache volume mount — model is baked in
          docker run --rm \
            -e GITHUB_RUN_ID="run_${{ github.sha }}" \
            -v ${{ github.workspace }}:/app/workspace \
            ${{ steps.image.outputs.image }}:latest python src/triage_orchestrator.py --workspace /app/workspace --exclude-dirs "workspace_storage,tests,src"

      - name: Execute Stage 3 (DeepAgent Context Analysis & Synthesis)
        if: always()
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          UNIPASSAU_API_KEY: ${{ secrets.UNIPASSAU_API_KEY }}
        run: |
          docker run --rm \
            -e OPENAI_API_KEY \
            -e ANTHROPIC_API_KEY \
            -e GOOGLE_API_KEY \
            -e UNIPASSAU_API_KEY \
            -v ${{ github.workspace }}:/app/workspace \
            ${{ steps.image.outputs.image }}:latest python src/agent.py --workspace /app/workspace

      - name: Move Runtime Outputs to Systematic Artifact Cache Location
        if: always()
        run: |
          [ -f stage1_2_triage.json ] && mv stage1_2_triage.json workspace_storage/artifacts/run_${{ github.sha }}/ || true
          [ -f remediation_dossier.md ] && mv remediation_dossier.md workspace_storage/artifacts/run_${{ github.sha }}/ || true

      - name: Archive Run-Specific Security Artifact Dossier
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: security-triage-dossier-${{ github.sha }}
          path: workspace_storage/artifacts/run_${{ github.sha }}/
          retention-days: 14
