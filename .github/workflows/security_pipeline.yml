name: Two-Stage Vulnerability Detection Pipeline

on:
  pull_request:
    branches: [ main, master ]

jobs:
  security-triage:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Initialize Environment Workspace Directories
        run: |
          mkdir -p workspace_storage/codebase_vectors 
          mkdir -p workspace_storage/artifacts/run_${{ github.sha }}

      - name: Setup Docker Buildx Engine
        uses: docker/setup-buildx-action@v3

      - name: Build Operational Security Pipeline Container with GHA Caching
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          tags: appsec-pipeline:latest
          outputs: type=docker,dest=/tmp/appsec-pipeline.tar
          # Enable full multi-layer caching inside GitHub Actions backend
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Load Docker Image Locally
        run: docker load -i /tmp/appsec-pipeline.tar

      - name: Execute Stage 1 (Static Analysis Engine Capture)
        run: |
          docker run --rm -v ${{ github.workspace }}:/app/workspace appsec-pipeline:latest \
            -m semgrep.cli --config=p/python --config=/app/semgrep_rules/custom_appsec_rules.yaml --exclude src --exclude workspace_storage --json --output=/app/workspace/semgrep_results.json

      - name: Execute Stage 2 (Local SLM Mathematical Gating)
        env:
          GITHUB_RUN_ID: "run_${{ github.sha }}"
        run: |
          docker run --rm \
            -e GITHUB_RUN_ID="run_${{ github.sha }}" \
            -v ${{ github.workspace }}:/app/workspace \
            appsec-pipeline:latest src/triage_orchestrator.py --workspace /app/workspace --exclude-dirs "workspace_storage,tests,src"

      - name: Execute Stage 3 (DeepAgent Context Analysis & Synthesis)
        if: always() # Allows internal scripts to decide termination rather than CI breaking early
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
        run: |
          docker run --rm \
            -e OPENAI_API_KEY \
            -e ANTHROPIC_API_KEY \
            -e GOOGLE_API_KEY \
            -v ${{ github.workspace }}:/app/workspace \
            appsec-pipeline:latest src/agent.py --workspace /app/workspace

      - name: Move Runtime Outputs to Systematic Artifact Cache Location
        if: always()
        run: |
          [ -f stage1_2_triage.json ] && mv stage1_2_triage.json workspace_storage/artifacts/run_${{ github.sha }}/ || true
          [ -f remediation_dossier.md ] && mv remediation_dossier.md workspace_storage/artifacts/run_${{ github.sha }}/ || true

      - name: Archive Run-Specific Security Artifact Dossier
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: security-triage-dossier-${{ github.sha }}
          path: workspace_storage/artifacts/run_${{ github.sha }}/
          retention-days: 14
