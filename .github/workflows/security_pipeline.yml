name: Two-Stage Vulnerability Detection Pipeline

on:
  pull_request:
    branches: [ main, master ]
  push:
    branches: [ main, master ]

# config.json → models.classifier_model is the single source of truth for the
# model ID. The workflow reads it once at the start and passes it to every
# step that needs it (HF pull, Stage 2, Stage 3). Changing the model requires
# editing only config.json.
env:
  CEVUD_RUN_ID: run_${{ github.run_id }}

jobs:
  security-triage:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Extract classifier model ID from config.json
        id: model-id
        run: |
          MODEL_ID=$(python -c "import json; print(json.load(open('config.json'))['models']['classifier_model'])")
          echo "model_id=$MODEL_ID" >> "$GITHUB_OUTPUT"
          echo "[*] Classifier model from config.json: $MODEL_ID"

      - name: Compute lowercase image reference
        id: image
        run: |
          IMAGE="ghcr.io/${{ github.repository }}/appsec-pipeline"
          echo "image=$(echo "$IMAGE" | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

      - name: Initialize Environment Workspace Directories
        run: |
          echo "[*] Stage 2/3 will create workspace_storage subdirectories on demand via run_context.py"

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull Pre-Built Security Pipeline Image
        run: |
          docker pull ${{ steps.image.outputs.image }}:latest

      - name: Pull SLM from HuggingFace Hub (if not pre-cached in image)
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          docker run --rm \
            -v ${{ github.workspace }}:/workspace \
            -e HF_TOKEN \
            -e CLASSIFIER_MODEL="${{ steps.model-id.outputs.model_id }}" \
            ${{ steps.image.outputs.image }}:latest \
            python -c "
            import os, sys
            from huggingface_hub import snapshot_download
            token = os.environ.get('HF_TOKEN') or None
            model_id = os.environ.get('CLASSIFIER_MODEL', '').strip()
            if not model_id:
                print('[*] No CLASSIFIER_MODEL set, skipping.')
                sys.exit(0)
            try:
                path = snapshot_download(model_id, token=token)
                print(f'[+] Model cached at: {path}')
            except Exception as exc:
                print(f'[!] Model download failed (will try again at runtime): {exc}')
            "

      - name: Execute Stage 1 (Static Analysis Engine Capture)
        run: |
          RUN_DIR="workspace_storage/artifacts/${CEVUD_RUN_ID}"
          mkdir -p "$RUN_DIR"
          docker run --rm \
            -e CEVUD_RUN_ID="${CEVUD_RUN_ID}" \
            -v ${{ github.workspace }}:/workspace ${{ steps.image.outputs.image }}:latest \
            semgrep --config=p/python --config=/app/semgrep_rules/custom_appsec_rules.yaml --no-git-ignore --exclude src --exclude workspace_storage --exclude cevud-scanner --json --output="/workspace/${RUN_DIR}/semgrep_results.json" /workspace

      - name: Execute Stage 2 (Local SLM Mathematical Gating)
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          docker run --rm \
            -e CEVUD_RUN_ID="${CEVUD_RUN_ID}" \
            -e HF_TOKEN="${HF_TOKEN}" \
            -e CLASSIFIER_MODEL="${{ steps.model-id.outputs.model_id }}" \
            -v ${{ github.workspace }}:/workspace \
            ${{ steps.image.outputs.image }}:latest python /app/src/triage_orchestrator.py --workspace /workspace --config /app/config.json --exclude-dirs "workspace_storage,tests,src"

      - name: Execute Stage 3 (DeepAgent Context Analysis & Synthesis)
        if: always()
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          UNIPASSAU_API_KEY: ${{ secrets.UNIPASSAU_API_KEY }}
        run: |
          docker run --rm \
            -e OPENAI_API_KEY \
            -e ANTHROPIC_API_KEY \
            -e GOOGLE_API_KEY \
            -e UNIPASSAU_API_KEY \
            -e CEVUD_RUN_ID="${CEVUD_RUN_ID}" \
            -v ${{ github.workspace }}:/workspace \
            ${{ steps.image.outputs.image }}:latest python /app/src/agent.py --workspace /workspace --config /app/config.json

      - name: Archive Run-Specific Security Artifact Dossier
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: security-triage-dossier-${{ github.run_id }}
          path: workspace_storage/artifacts/${{ env.CEVUD_RUN_ID }}/
          retention-days: 14
